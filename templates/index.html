<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Compliance Auditor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Loader animation */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen font-sans text-slate-800 antialiased selection:bg-blue-200">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div
                    class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-200">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
                        </path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">Legal Compliance Auditor</h1>
                    <p class="text-xs text-slate-500">AI-Powered AI Contract Verification</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 h-[calc(100vh-80px)] flex flex-col gap-6">

        <!-- Upload Section -->
        <section class="glass-panel rounded-2xl p-6 transition-all duration-300">
            <h2 class="text-lg font-semibold mb-4 text-slate-800 flex items-center">
                <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                </svg>
                Upload Documents
            </h2>
            <form id="uploadForm" class="flex flex-col md:flex-row gap-4 items-end">
                <div class="flex-1 w-full">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Target Contract (PDF)</label>
                    <div class="relative">
                        <input type="file" id="contract" name="contract" accept=".pdf"
                            class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    </div>
                </div>

                <div class="flex-1 w-full">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Company Policies Reference
                        (PDF)</label>
                    <div class="relative">
                        <input type="file" id="policies" name="policies" accept=".pdf"
                            class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white">
                    </div>
                </div>

                <button type="submit" id="analyzeBtn"
                    class="w-full md:w-auto bg-slate-900 hover:bg-slate-800 text-white font-semibold py-2.5 px-6 rounded-lg shadow-md transition-all duration-200 transform hover:scale-[1.02] flex items-center justify-center">
                    <span>Audit Contract</span>
                    <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </form>
        </section>

        <!-- Loading State -->
        <div id="loadingState" class="hidden flex-col items-center justify-center py-12">
            <div class="loader mb-4"></div>
            <p class="text-slate-600 font-medium">Cross-referencing contract against company policies...</p>
            <p class="text-slate-400 text-sm mt-1">Extracting clauses and running RAG analysis</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                        fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                            clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="ml-3">
                    <h3 class="text-sm font-medium text-red-800" id="errorMessage">Error analyzing documents</h3>
                </div>
            </div>
        </div>

        <!-- Results Section (Split Pane) -->
        <div id="resultsSection" class="hidden flex-1 flex flex-col lg:flex-row gap-6 min-h-0 pb-6">

            <!-- Left Pane: Original Context -->
            <div class="lg:w-1/2 flex flex-col glass-panel rounded-2xl overflow-hidden">
                <div class="bg-slate-100/50 px-4 py-3 border-b border-slate-200 flex items-center justify-between">
                    <h3 class="font-semibold text-slate-800 flex items-center">
                        <svg class="w-4 h-4 mr-2 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                        Target Contract Preview
                    </h3>
                </div>
                <div class="flex-1 overflow-y-auto p-6 bg-white">
                    <div id="contractPreview"
                        class="prose prose-sm max-w-none text-slate-600 font-serif whitespace-pre-wrap leading-relaxed">
                        <!-- Contract text injected here -->
                    </div>
                </div>
            </div>

            <!-- Right Pane: Audit Report -->
            <div class="lg:w-1/2 flex flex-col glass-panel rounded-2xl overflow-hidden">
                <div class="bg-slate-100/50 px-4 py-3 border-b border-slate-200 flex items-center justify-between">
                    <h3 class="font-semibold text-slate-800 flex items-center">
                        <svg class="w-4 h-4 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4">
                            </path>
                        </svg>
                        Audit Report
                    </h3>
                    <span id="riskCount"
                        class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">
                        0 Risks Found
                    </span>
                </div>
                <div class="flex-1 overflow-y-auto p-4 bg-slate-50/50 space-y-4" id="auditFindings">
                    <!-- Cards injected here -->
                </div>
            </div>

        </div>
    </main>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const form = e.target;
            const formData = new FormData(form);
            const btn = document.getElementById('analyzeBtn');
            const loading = document.getElementById('loadingState');
            const results = document.getElementById('resultsSection');
            const errorState = document.getElementById('errorState');

            // Reset UI
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            loading.classList.remove('hidden');
            loading.classList.add('flex');
            results.classList.add('hidden');
            errorState.classList.add('hidden');

            try {
                const response = await fetch('/audit', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Server error occurred');
                }

                // Populate content
                document.getElementById('contractPreview').textContent = data.contract_preview;

                const findingsContainer = document.getElementById('auditFindings');
                findingsContainer.innerHTML = '';

                let highRiskCount = 0;

                if (data.findings && data.findings.length > 0) {
                    data.findings.forEach(item => {
                        const isHighRisk = item.status === 'High Risk';
                        if (isHighRisk) highRiskCount++;

                        const colorClass = isHighRisk ? 'border-red-200 bg-red-50/50' : 'border-emerald-200 bg-emerald-50/50';
                        const iconBg = isHighRisk ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-600';
                        const titleColor = isHighRisk ? 'text-red-800' : 'text-emerald-800';
                        const statusBadge = isHighRisk
                            ? `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800 border border-red-200">High Risk</span>`
                            : `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-emerald-100 text-emerald-800 border border-emerald-200">Match</span>`;

                        const icon = isHighRisk
                            ? `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`
                            : `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;

                        const card = `
                            <div class="rounded-xl border ${colorClass} p-4 shadow-sm transition-transform hover:-translate-y-1 duration-200">
                                <div class="flex items-start justify-between mb-3">
                                    <div class="flex items-center space-x-3">
                                        <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${iconBg}">
                                            ${icon}
                                        </div>
                                        <h4 class="font-bold ${titleColor} text-sm uppercase tracking-wider">${item.clause}</h4>
                                    </div>
                                    ${statusBadge}
                                </div>
                                <p class="text-slate-700 text-sm leading-relaxed ml-11">${item.finding}</p>
                            </div>
                        `;
                        findingsContainer.insertAdjacentHTML('beforeend', card);
                    });
                } else {
                    findingsContainer.innerHTML = `<div class="p-8 text-center text-slate-500">No findings generated. Check documents.</div>`;
                }

                // Update Risk Counter
                const riskBadge = document.getElementById('riskCount');
                riskBadge.textContent = `${highRiskCount} Risk${highRiskCount !== 1 ? 's' : ''} Found`;
                if (highRiskCount === 0) {
                    riskBadge.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800';
                } else {
                    riskBadge.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800';
                }

                // Show results
                loading.classList.remove('flex');
                loading.classList.add('hidden');
                results.classList.remove('hidden');

            } catch (error) {
                loading.classList.remove('flex');
                loading.classList.add('hidden');
                errorState.classList.remove('hidden');
                document.getElementById('errorMessage').textContent = error.message;
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });
    </script>
</body>

</html>
